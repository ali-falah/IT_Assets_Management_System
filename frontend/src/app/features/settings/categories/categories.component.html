<div class="max-w-4xl mx-auto space-y-6 flex-1 flex flex-col w-full">
  <div class="flex items-center space-x-4">
    <a routerLink="/settings" class="p-2 bg-white border border-slate-200 rounded-lg text-slate-500 hover:text-slate-800 hover:bg-slate-50 transition-colors">
      <lucide-icon name="arrow-left" [size]="20"></lucide-icon>
    </a>
    <div>
      <h1 class="text-2xl font-bold text-slate-800 flex items-center">
        <lucide-icon name="tags" [size]="24" class="mr-2 text-indigo-600"></lucide-icon>
        Manage Categories
      </h1>
      <p class="text-sm text-slate-500 mt-1">Organize your assets into functional categories.</p>
    </div>
  </div>

  <!-- Search & Add Header -->
  <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
    <div class="relative group w-full md:max-w-md">
      <div class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </div>
      <input 
        type="text" 
        [(ngModel)]="searchTerm"
        placeholder="Search categories..." 
        class="pl-10 pr-4 py-2.5 border border-slate-200 rounded-xl text-sm bg-white hover:border-slate-300 focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none w-full transition-all duration-200 shadow-sm"
      >
    </div>
    <button *ngIf="!addingCat" (click)="addingCat = true" class="w-full md:w-auto bg-primary hover:bg-indigo-600 text-white px-4 py-2.5 rounded-xl text-sm font-bold transition-all flex items-center justify-center shadow-md active:scale-95">
      <lucide-icon name="plus" [size]="18" class="mr-2"></lucide-icon> Add New Category
    </button>
  </div>

  <!-- Add/Edit Form -->
  <div *ngIf="addingCat || editingCat" class="bg-white rounded-2xl shadow-lg border border-indigo-100 overflow-hidden animate-in fade-in slide-in-from-top-4 duration-300">
    <div class="p-6 space-y-6">
      <div class="flex justify-between items-center">
        <h3 class="text-lg font-bold text-slate-800">{{ addingCat ? 'New Category' : 'Edit Category' }}</h3>
        <button (click)="addingCat = false; editingCat = null" class="text-slate-400 hover:text-slate-600"><lucide-icon name="x" [size]="20"></lucide-icon></button>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Category Name</label>
          <input *ngIf="addingCat" type="text" [(ngModel)]="newCat.name" placeholder="e.g. Laptops" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all">
          <input *ngIf="!addingCat" type="text" [(ngModel)]="editCatData.name" placeholder="e.g. Laptops" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Description</label>
          <input *ngIf="addingCat" type="text" [(ngModel)]="newCat.description" placeholder="Brief description" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all">
          <input *ngIf="!addingCat" type="text" [(ngModel)]="editCatData.description" placeholder="Brief description" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all">
        </div>
      </div>
      
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Choose Icon</label>
          <div class="grid grid-cols-6 sm:grid-cols-8 gap-2 p-3 bg-slate-50 rounded-2xl border border-slate-100">
            @for (icon of iconOptions; track icon) {
              <button (click)="addingCat ? newCat.icon = icon : editCatData.icon = icon" 
                [class.bg-primary]="(addingCat ? newCat.icon : editCatData.icon) === icon"
                [class.text-white]="(addingCat ? newCat.icon : editCatData.icon) === icon"
                class="p-2 rounded-lg hover:bg-white hover:shadow-sm transition-all flex items-center justify-center">
                <lucide-icon [name]="icon" [size]="18"></lucide-icon>
              </button>
            }
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Brand Color</label>
          <div class="grid grid-cols-6 gap-3 p-4 bg-slate-50 rounded-2xl border border-slate-100">
            @for (color of colorOptions; track color) {
              <button (click)="addingCat ? newCat.color = color : editCatData.color = color" 
                [class.ring-4]="(addingCat ? newCat.color : editCatData.color) === color"
                class="w-8 h-8 rounded-full bg-{{color}}-500 transition-all border-2 border-white shadow-sm ring-{{color}}-400/30">
              </button>
            }
          </div>
        </div>
      </div>

      <div class="flex justify-end space-x-3 pt-6 border-t border-slate-100">
        <button (click)="addingCat = false; editingCat = null" class="px-6 py-2.5 border border-slate-200 text-slate-600 rounded-xl hover:bg-slate-50 font-bold text-sm transition-all">Cancel</button>
        <button (click)="addingCat ? saveNewCategory() : saveCategory()" 
          [disabled]="addingCat ? !newCat.name : !editCatData.name" 
          class="px-8 py-2.5 bg-primary text-white rounded-xl hover:bg-indigo-600 font-bold text-sm transition-all shadow-lg shadow-primary/20 disabled:opacity-50 active:scale-95">
          {{ addingCat ? 'Create Category' : 'Update Category' }}
        </button>
      </div>
    </div>
  </div>

  <!-- Reusable Data Table -->
  <app-data-table 
    [data]="filteredCategories" 
    [columns]="columns" 
    [loading]="loading"
    [actionsTemplate]="actionsTemplate">
  </app-data-table>
</div>

<!-- Custom Templates for Table Cells -->
<ng-template #iconTemplate let-cat>
  <div class="flex items-center">
    <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-{{cat.color || 'slate'}}-50 text-{{cat.color || 'slate'}}-600 mr-3 border border-{{cat.color || 'slate'}}-100">
      <lucide-icon [name]="cat.icon || 'package'" [size]="20"></lucide-icon>
    </div>
    <span class="font-bold text-slate-800">{{ cat.name }}</span>
  </div>
</ng-template>

<ng-template #actionsTemplate let-cat>
  <div class="flex justify-end space-x-1">
    <button (click)="startEditCategory(cat)" class="p-2 text-slate-400 hover:text-primary hover:bg-primary/5 rounded-lg transition-colors">
      <lucide-icon name="pencil" [size]="18"></lucide-icon>
    </button>
    <button (click)="deleteCategory(cat)" class="p-2 text-slate-400 hover:text-rose-500 hover:bg-rose-50 rounded-lg transition-colors">
      <lucide-icon name="trash-2" [size]="18"></lucide-icon>
    </button>
  </div>
</ng-template>

<!-- Shared Reusable Confirmation Modal -->
<app-confirmation-modal
  [show]="showConfirmDelete"
  title="Delete Category?"
  [message]="'Are you sure you want to delete ' + categoryToDelete?.name + '? This action is permanent and might affect assets assigned to this category.'"
  confirmText="Delete Category"
  (confirm)="executeDelete()"
  (cancel)="showConfirmDelete = false">
</app-confirmation-modal>
