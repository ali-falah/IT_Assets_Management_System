<div class="h-full flex flex-col p-6 lg:p-8 bg-slate-50/50">
  <!-- Header Section -->
  <div class="mb-8">
    <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-6">
      <div>
        <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Users & Staff</h1>
        <p class="text-slate-500 mt-1 text-sm font-medium">Manage system access and asset assignees</p>
      </div>

      <div class="flex flex-wrap items-center gap-3">
        <!-- Search Bar -->
        <div class="relative min-w-[300px]">
          <lucide-icon name="search" [size]="16" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></lucide-icon>
          <input 
            type="text" 
            placeholder="Search by name, email, role..." 
            (input)="onSearch($event)"
            class="w-full pl-9 pr-4 py-2 bg-white border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all shadow-sm outline-none placeholder:text-slate-400"
          >
        </div>

        <div class="h-8 w-px bg-slate-200 mx-1 hidden lg:block"></div>

        <div class="flex items-center gap-2">
          <button 
            *ngIf="selectedCount > 0"
            (click)="deleteSelectedUsers()" 
            class="bg-rose-50 text-rose-600 hover:bg-rose-100 px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center border border-rose-100"
          >
            <lucide-icon name="trash-2" [size]="16" class="mr-2"></lucide-icon>
            Delete ({{selectedCount}})
          </button>
          
          <button (click)="showImportModal = true" class="bg-white border border-slate-200 text-slate-600 px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-50 transition-colors flex items-center shadow-sm">
            <lucide-icon name="user-plus" [size]="16" class="mr-2"></lucide-icon>
            Import
          </button>
          
          <button (click)="openModal()" class="bg-primary hover:bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center shadow-lg shadow-indigo-100">
            <lucide-icon name="plus" [size]="16" class="mr-2"></lucide-icon>
            New User
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Grid Section -->
  <div class="flex-1 min-h-0 bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
    <!-- Desktop Skeleton Loader -->
    <div *ngIf="loading && users.length === 0" class="flex-1 p-6">
      <div class="flex items-center gap-4 px-4 py-3 border-b border-slate-100">
        <div class="w-4 h-4 bg-slate-100 rounded animate-pulse"></div>
        <div class="h-3 bg-slate-100 rounded w-28 animate-pulse"></div>
        <div class="h-3 bg-slate-100 rounded w-24 animate-pulse ml-8"></div>
        <div class="h-3 bg-slate-100 rounded w-12 animate-pulse ml-8"></div>
        <div class="h-3 bg-slate-100 rounded w-16 animate-pulse ml-8"></div>
        <div class="h-3 bg-slate-100 rounded w-16 animate-pulse ml-auto"></div>
      </div>
      <div *ngFor="let i of [1,2,3,4,5,6,7,8]" class="flex items-center gap-4 px-4 py-4 border-b border-slate-50">
        <div class="w-4 h-4 bg-slate-100 rounded animate-pulse"></div>
        <div class="h-3.5 bg-slate-100 rounded w-36 animate-pulse"></div>
        <div class="h-3 bg-slate-100 rounded w-44 animate-pulse ml-8"></div>
        <div class="h-5 bg-slate-100 rounded-lg w-8 animate-pulse ml-8"></div>
        <div class="h-5 bg-slate-100 rounded-full w-16 animate-pulse ml-8"></div>
        <div class="h-3 bg-slate-100 rounded w-14 animate-pulse ml-auto"></div>
      </div>
    </div>

    <ag-grid-angular
      *ngIf="!loading || users.length > 0"
      class="ag-theme-quartz w-full flex-1"
      [rowData]="users"
      [columnDefs]="columnDefs"
      [defaultColDef]="defaultColDef"
      [rowSelection]="{ mode: 'multiRow' }"
      [suppressRowClickSelection]="true"
      [pagination]="true"
      [paginationPageSize]="50"
      (gridReady)="onGridReady($event)"
      (selectionChanged)="onSelectionChanged()"
      [icons]="gridIcons"
    ></ag-grid-angular>
  </div>
</div>

<!-- Add User Modal -->
<div *ngIf="showModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden border border-slate-100">
    <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
      <h3 class="font-bold text-slate-800">Add New User</h3>
      <button (click)="closeModal()" class="p-2 hover:bg-slate-200 rounded-lg transition-colors">
        <lucide-icon name="x" [size]="18" class="text-slate-500"></lucide-icon>
      </button>
    </div>
    
    <div class="p-6 space-y-4">
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Full Name</label>
        <input type="text" [(ngModel)]="newUser.name" placeholder="e.g. John Doe" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none">
      </div>
      
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Email Address</label>
        <input type="email" [(ngModel)]="newUser.email" placeholder="john@example.com" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none">
      </div>
      
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Password</label>
        <input type="password" [(ngModel)]="newUser.password" placeholder="••••••••" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none">
      </div>
      
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">System Role</label>
        <select [(ngModel)]="newUser.roleId" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none">
          <option *ngFor="let role of roles" [value]="role.id">{{ role.name | titlecase }}</option>
        </select>
      </div>
    </div>
    
    <div class="px-6 py-4 bg-slate-50 border-t border-slate-100 flex items-center justify-end gap-3">
      <button (click)="closeModal()" class="px-4 py-2 text-sm font-bold text-slate-600 hover:bg-slate-200 rounded-lg transition-colors">Cancel</button>
      <button (click)="createUser()" [disabled]="saving" class="px-6 py-2 bg-primary hover:bg-indigo-600 text-white text-sm font-bold rounded-lg transition-colors flex items-center shadow-md">
        <span *ngIf="saving" class="mr-2 w-4 h-4 border-2 border-white/20 border-t-white rounded-full animate-spin"></span>
        Create User
      </button>
    </div>
  </div>
</div>

<!-- Import Modal -->
<app-user-import *ngIf="showImportModal" (close)="showImportModal = false" (imported)="loadUsers()"></app-user-import>

<!-- Detail Dialog -->
<app-user-detail-dialog 
  *ngIf="showDetailDialog" 
  [userId]="selectedUserId" 
  (close)="showDetailDialog = false; selectedUserId = null"
  (deleted)="loadUsers()">
</app-user-detail-dialog>

<!-- Standard Delete Confirmation -->
<div *ngIf="showConfirmDelete && !showUnassignConfirm" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
  <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md transform transition-all overflow-hidden border border-slate-100">
    <div class="p-8 text-center">
      <div class="w-20 h-20 bg-rose-50 rounded-full flex items-center justify-center mx-auto mb-6">
        <lucide-icon name="trash-2" [size]="32" class="text-rose-500"></lucide-icon>
      </div>
      
      <h3 class="text-xl font-bold text-slate-800 mb-2">Delete User?</h3>
      <p class="text-slate-500 mb-8 leading-relaxed">
        This action is permanent. The user will lose access to the system immediately.
      </p>
      
      <div class="flex items-center gap-3">
        <button (click)="cancelDelete()" 
                class="flex-1 px-6 py-3 border border-slate-200 rounded-xl text-slate-600 font-bold text-sm hover:bg-slate-50 transition-all">
          Cancel
        </button>
        <button (click)="executeDelete(false)" 
                class="flex-1 px-6 py-3 bg-rose-500 text-white rounded-xl font-bold text-sm hover:bg-rose-600 shadow-lg shadow-rose-200 transition-all">
          Yes, Delete
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Secondary "Unassign & Delete" Confirmation (409 Conflict) -->
<div *ngIf="showUnassignConfirm" class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
  <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md transform transition-all overflow-hidden border border-amber-100">
    <div class="p-8 text-center">
      <div class="w-20 h-20 bg-amber-50 rounded-full flex items-center justify-center mx-auto mb-6">
        <lucide-icon name="triangle-alert" [size]="32" class="text-amber-500"></lucide-icon>
      </div>
      
      <h3 class="text-xl font-bold text-slate-800 mb-2">User has Assets</h3>
      <p class="text-slate-500 mb-4 leading-relaxed italic text-sm">
        "{{ unassignErrorMsg }}"
      </p>
      <p class="text-slate-600 mb-8 font-medium">
        Do you want to unassign all assets from this user and delete the account?
      </p>
      
      <div class="flex flex-col gap-3">
        <button (click)="executeDelete(true)" 
                class="w-full px-6 py-4 bg-amber-500 text-white rounded-xl font-bold text-sm hover:bg-amber-600 shadow-lg shadow-amber-200 transition-all flex items-center justify-center">
          <lucide-icon name="trash-2" [size]="18" class="mr-2"></lucide-icon>
          Unassign Assets & Delete
        </button>
        <button (click)="cancelDelete()" 
                class="w-full px-6 py-3 border border-slate-200 rounded-xl text-slate-500 font-bold text-sm hover:bg-slate-50 transition-all">
          No, Keep User
        </button>
      </div>
    </div>
  </div>
</div>
